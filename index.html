<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Churrasco PRO</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #fff5f0;
      margin: 0;
    }

    header {
      background: #8B0000;
      color: white;
      padding: 20px;
    }

    main {
      padding: 20px;
    }

    input {
      padding: 10px;
      margin: 8px;
      width: 160px;
      font-size: 16px;
    }

    button {
      padding: 12px 20px;
      background: #d9534f;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #c9302c;
    }

    .box {
      margin-top: 20px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: left;
    }
  </style>
</head>
<body>

<header>
  <h1>🔥 Churrasco PRO</h1>
  <p>Calcule tudo para seu churrasco</p>
</header>

<main>
  <h3>Quantidade de pessoas</h3>
  <input type="number" id="adultos" placeholder="Adultos">
  <input type="number" id="criancas" placeholder="Crianças">

  <h3>Preço da carne (R$/kg)</h3>
  <input type="number" id="precoCarne" placeholder="Ex: 40">

  <br><br>
  <button onclick="calcular()">Calcular</button>

  <div class="box" id="resultado"></div>
</main>

<script>
function calcular() {
  let adultos = Number(document.getElementById("adultos").value);
  let criancas = Number(document.getElementById("criancas").value);
  let preco = Number(document.getElementById("precoCarne").value);

  if (adultos <= 0) {
    alert("Digite pelo menos 1 adulto!");
    return;
  }

  // consumo
  let carne = (adultos * 0.5) + (criancas * 0.25);
  let cerveja = adultos * 1.5; // litros
  let refri = (adultos + criancas) * 0.5; // litros

  let custo = carne * preco;

  document.getElementById("resultado").innerHTML =
    "<h3>Resultado:</h3>" +
    "🥩 Carne: " + carne.toFixed(2) + " kg<br>" +
    "🍺 Cerveja: " + cerveja.toFixed(1) + " L<br>" +
    "🥤 Refrigerante: " + refri.toFixed(1) + " L<br>" +
    "<br><strong>💰 Custo estimado: R$ " + custo.toFixed(2) + "</strong>";
}
</script>

</body>
</html>
